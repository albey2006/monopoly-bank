<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UK-Opoly + Monopoly Bank System</title>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body { font-family:sans-serif; background:#121212; color:white; margin:0; padding:15px; text-align:center; }
.card { background:#1e1e1e; padding:15px; border-radius:10px; margin:10px 0; }
.hide { display:none; }
button { width:100%; padding:10px; margin-top:5px; background:#cf1020; color:white; border:none; border-radius:5px; }
input, select { width:100%; padding:10px; margin-top:5px; box-sizing:border-box; }
.smallbtn { width:auto; padding:6px 10px; margin:3px; background:#333; }
</style>
</head>

<body>

<!-- HOST -->
<div id="host">
<h2>Opoly Banking System</h2>

<div class="card">
<button onclick="startHost()">Start Game</button>
</div>

<div id="hostPanel" class="hide">

<div class="card">
<h3>Room Code</h3>
<div id="roomText"></div>
<div id="qr"></div>
</div>

<div class="card">
<h3>Game Mode</h3>
<select id="mode">
<option value="monopoly">Monopoly</option>
<option value="ukopoly">UK-Opoly</option>
</select>
</div>

<div class="card">
<h3>Players</h3>
<div id="players"></div>
</div>

<div class="card">
<h3>🏦 Bank Control</h3>

<select id="bankTo"></select>
<input id="bankAmt" type="number" placeholder="Amount">
<button onclick="bankPay()">Send Money From Bank</button>

<button onclick="passGo()">Award Pass GO (+$200)</button>

</div>

<div class="card">
<h3>Transaction Log</h3>
<div id="log"></div>
</div>

</div>
</div>

<!-- PHONE -->
<div id="phone" class="hide">

<h3>Wallet</h3>
<p id="roomStatus"></p>

<div class="card hide" id="setup">

<h3>Join Game</h3>

<input id="nick" placeholder="Your name">

<select id="slot">
<option value="P1">Player 1</option>
<option value="P2">Player 2</option>
<option value="P3">Player 3</option>
<option value="P4">Player 4</option>
<option value="P5">Player 5</option>
<option value="P6">Player 6</option>
</select>

<button onclick="joinGame()">Join</button>

</div>

<div class="card hide" id="wallet">

<h2 id="me"></h2>
<h1 id="bal"></h1>

<select id="toName"></select>
<input id="amt" type="number" placeholder="Amount">
<button onclick="sendMoney()">Send Money</button>

</div>

</div>

<script>

/* ================= CORE ================= */

let players = {
P1:{name:"",balance:1500},
P2:{name:"",balance:1500},
P3:{name:"",balance:1500},
P4:{name:"",balance:1500},
P5:{name:"",balance:1500},
P6:{name:"",balance:1500}
};

let bank = { balance: 100000 }; // large system bank

let peer, conn, roomId;
let connections = [];
let myId = "";

let transactions = [];

/* ================= HOST ================= */

function startHost(){

roomId = "MONO-" + Math.random().toString(36).substring(2,6).toUpperCase();

peer = new Peer(roomId);

peer.on("open", () => {

document.getElementById("hostPanel").classList.remove("hide");
document.getElementById("roomText").innerText = roomId;

new QRCode(document.getElementById("qr"), {
text: location.href + "?room=" + roomId,
width:120,
height:120
});

});

peer.on("connection", c=>{
connections.push(c);
c.on("data", handleCmd);
c.on("open", broadcast);
});

renderHost();
}

/* ================= PHONE ================= */

const room = new URLSearchParams(location.search).get("room");

if(room){
document.getElementById("host").classList.add("hide");
document.getElementById("phone").classList.remove("hide");
document.getElementById("roomStatus").innerText = "Room: " + room;
connectPhone(room);
}

function connectPhone(room){

peer = new Peer();

peer.on("open", ()=>{
conn = peer.connect(room);

conn.on("open", ()=>{
document.getElementById("setup").classList.remove("hide");
});

conn.on("data", data=>{
players = data.players;

if(myId){
document.getElementById("wallet").classList.remove("hide");
renderPhone();
}
});
});
}

/* ================= JOIN ================= */

function joinGame(){

myId = document.getElementById("slot").value;
let name = document.getElementById("nick").value;

players[myId].name = name;

conn.send({
type:"SET_NAME",
player:myId,
name:name
});

document.getElementById("setup").classList.add("hide");
document.getElementById("wallet").classList.remove("hide");

renderPhone();
}

/* ================= PLAYER SEND ================= */

function sendMoney(){

let to = document.getElementById("toName").value;
let amt = parseInt(document.getElementById("amt").value);

if(!amt || amt <= 0) return;

conn.send({
type:"TRANSFER",
from:myId,
to:to,
amount:amt
});
}

/* ================= PASS GO ================= */

function passGo(){
let p = players[myId];
if(!p) return;

p.balance += 200;
addLog("BANK", p.name, 200);
broadcast();
renderHost();
renderPhone();
}

/* ================= BANK PAY ================= */

function bankPay(){

let to = document.getElementById("bankTo").value;
let amt = parseInt(document.getElementById("bankAmt").value);

if(!amt || amt <= 0) return;

let target = players[to];

if(target){

target.balance += amt;

addLog("BANK", target.name, amt);

broadcast();
renderHost();
}
}

/* ================= HOST LOGIC ================= */

function handleCmd(cmd){

if(cmd.type==="SET_NAME"){
players[cmd.player].name = cmd.name;
}

/* PLAYER → PLAYER */
if(cmd.type==="TRANSFER"){

let from = players[cmd.from];
let to = players[cmd.to];

if(from && to && from.balance >= cmd.amount){

from.balance -= cmd.amount;
to.balance += cmd.amount;

addLog(from.name, to.name, cmd.amount);
}
}

broadcast();
renderHost();
}

/* ================= LOG ================= */

function addLog(from,to,amount){

transactions.unshift({from,to,amount});
if(transactions.length > 40) transactions.pop();
renderLog();
}

function renderLog(){

let log = document.getElementById("log");
log.innerHTML = "";

transactions.forEach(t=>{
log.innerHTML += `
<div style="text-align:left; padding:5px; border-bottom:1px solid #333;">
${t.from} → ${t.to} $${t.amount}
</div>`;
});

}

/* ================= HOST UI ================= */

function renderHost(){

let div = document.getElementById("players");
div.innerHTML = "";

for(let i in players){
div.innerHTML += `
<div style="margin:5px; padding:8px; background:#222;">
<b>${players[i].name}</b> - $${players[i].balance}
</div>`;
}

/* dropdown */
let sel = document.getElementById("bankTo");
if(sel){
sel.innerHTML = "";
for(let i in players){
sel.innerHTML += `<option value="${i}">${players[i].name}</option>`;
}
}

renderLog();
}

/* ================= PHONE UI ================= */

function renderPhone(){

let me = players[myId];

document.getElementById("me").innerText = me.name;
document.getElementById("bal").innerText = "$" + me.balance;

/* ONLY PLAYERS */
let sel = document.getElementById("toName");
sel.innerHTML = "";

for(let i in players){
if(i !== myId){
sel.innerHTML += `<option value="${i}">${players[i].name}</option>`;
}
}

}

/* ================= BROADCAST ================= */

function broadcast(){
connections.forEach(c=>{
if(c.open) c.send({players});
});
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monopoly / UK-Opoly Bank System</title>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body { font-family:sans-serif; background:#121212; color:white; margin:0; padding:15px; text-align:center; }
.card { background:#1e1e1e; padding:15px; border-radius:10px; margin:10px 0; }
.hide { display:none; }
button { width:100%; padding:10px; margin-top:5px; background:#cf1020; color:white; border:none; border-radius:5px; }
input, select { width:100%; padding:10px; margin-top:5px; box-sizing:border-box; }
.grid { display:grid; grid-template-columns:2fr 1fr; gap:10px; max-width:1100px; margin:auto; }
.prop { padding:8px; background:#222; margin:4px 0; border-left:4px solid white; }
</style>
</head>

<body>

<!-- ================= HOST ================= -->
<div id="host">

<h2>Monopoly Bank (HOST)</h2>

<div class="card">
<label>Board Type</label>
<select id="boardType">
<option value="classic">Classic Monopoly</option>
<option value="uk">UK-Opoly</option>
</select>
<button onclick="startHost()">Start Game</button>
</div>

<div id="hostPanel" class="hide">

<div class="card">
<h3>Room Code</h3>
<div id="roomText"></div>
<div id="qr"></div>
</div>

<div class="grid">
<div class="card">
<h3>Players</h3>
<div id="players"></div>
</div>

<div class="card">
<h3>Properties</h3>
<div id="properties"></div>
</div>
</div>

</div>
</div>

<!-- ================= PHONE ================= -->
<div id="phone" class="hide">

<h3>Player Wallet</h3>
<p id="roomStatus"></p>

<div class="card hide" id="nameSetup">
<h3>Enter Nickname</h3>

<input id="nick" placeholder="Your name">

<select id="slot">
<option value="P1">Slot 1</option>
<option value="P2">Slot 2</option>
<option value="P3">Slot 3</option>
<option value="P4">Slot 4</option>
<option value="P5">Slot 5</option>
<option value="P6">Slot 6</option>
</select>

<button onclick="joinGame()">Join Game</button>
</div>

<div class="card hide" id="wallet">

<h2 id="me"></h2>
<h1 id="bal"></h1>

<input id="toName" placeholder="Send to (nickname)">
<input id="amt" type="number" placeholder="Amount">
<button onclick="sendMoney()">Send Money</button>

</div>

</div>

<script>

/* ================= BOARDS ================= */

const classic = {
MED:{name:"Mediterranean Ave",cost:60,rent:2,color:"#955436",owner:null},
BAL:{name:"Baltic Ave",cost:60,rent:4,color:"#955436",owner:null},
KEN:{name:"Kentucky Ave",cost:220,rent:18,color:"#ed1c24",owner:null},
BWD:{name:"Boardwalk",cost:400,rent:50,color:"#0054a6",owner:null}
};

const uk = {
UK1:{name:"UK Main Campus",cost:120,rent:10,color:"#0033a0",owner:null},
UK2:{name:"Memorial Coliseum",cost:140,rent:12,color:"#0033a0",owner:null},
UK3:{name:"Wildcat Lodge",cost:160,rent:14,color:"#0055ff",owner:null},
UK4:{name:"Medical Center",cost:180,rent:16,color:"#001f5b",owner:null},
UK5:{name:"Student Union",cost:200,rent:18,color:"#0033a0",owner:null},
UK6:{name:"Rupp Arena",cost:220,rent:20,color:"#0055ff",owner:null}
};

/* ================= STATE ================= */

let peer, conn, roomId;
let connections = [];

let players = {
P1:{name:"",balance:1500},
P2:{name:"",balance:1500},
P3:{name:"",balance:1500},
P4:{name:"",balance:1500},
P5:{name:"",balance:1500},
P6:{name:"",balance:1500}
};

let properties = {};
let myId = "";

/* ================= AUTO MODE ================= */

const room = new URLSearchParams(location.search).get("room");

if(room){
document.getElementById("host").classList.add("hide");
document.getElementById("phone").classList.remove("hide");
document.getElementById("roomStatus").innerText = "Room: " + room;
connectPhone(room);
}

/* ================= HOST ================= */

function startHost(){

let type = document.getElementById("boardType").value;
properties = JSON.parse(JSON.stringify(type==="uk"?uk:classic));

roomId = "MONO-" + Math.random().toString(36).substring(2,6).toUpperCase();

peer = new Peer(roomId);

peer.on("open", () => {
document.getElementById("hostPanel").classList.remove("hide");
document.getElementById("roomText").innerText = roomId;

new QRCode(document.getElementById("qr"), {
text: location.href + "?room=" + roomId,
width:120,
height:120
});
});

peer.on("connection", c=>{
connections.push(c);
c.on("data", handleCmd);
c.on("open", broadcast);
});

renderHost();
}

/* ================= PHONE ================= */

function connectPhone(room){

peer = new Peer();

peer.on("open", ()=>{
conn = peer.connect(room);

conn.on("open", ()=>{
document.getElementById("nameSetup").classList.remove("hide");
});

conn.on("data", data=>{
players = data.players;
properties = data.properties;

if(myId){
document.getElementById("wallet").classList.remove("hide");
renderPhone();
}
});
});
}

/* ================= JOIN ================= */

function joinGame(){

myId = document.getElementById("slot").value;
let name = document.getElementById("nick").value;

players[myId].name = name;

conn.send({
type:"SET_NAME",
player:myId,
name:name
});

document.getElementById("nameSetup").classList.add("hide");
document.getElementById("wallet").classList.remove("hide");

renderPhone();
}

/* ================= SEND MONEY ================= */

function sendMoney(){

let to = document.getElementById("toName").value.trim();
let amt = parseInt(document.getElementById("amt").value);

if(!amt || amt<=0) return;

conn.send({
type:"TRANSFER_NAME",
from:myId,
toName:to,
amount:amt
});
}

/* ================= HOST COMMANDS ================= */

function handleCmd(cmd){

if(cmd.type==="SET_NAME"){
players[cmd.player].name = cmd.name;
}

if(cmd.type==="TRANSFER_NAME"){

let from = players[cmd.from];

let toId = Object.keys(players).find(p=>
players[p].name.toLowerCase() === cmd.toName.toLowerCase()
);

if(toId && from.balance>=cmd.amount){
from.balance -= cmd.amount;
players[toId].balance += cmd.amount;
}
}

broadcast();
renderHost();
}

/* ================= RENDER ================= */

function renderHost(){

let p = document.getElementById("players");
p.innerHTML = "";

for(let i in players){
p.innerHTML += `<div>${players[i].name||i} - $${players[i].balance}</div>`;
}

let pr = document.getElementById("properties");
pr.innerHTML = "";

for(let i in properties){
pr.innerHTML += `<div class="prop">${properties[i].name}</div>`;
}
}

function renderPhone(){

let me = players[myId];

document.getElementById("me").innerText = me.name;
document.getElementById("bal").innerText = "$" + me.balance;
}

/* ================= BROADCAST ================= */

function broadcast(){
connections.forEach(c=>{
if(c.open) c.send({players,properties});
});
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monopoly Bank System</title>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body { font-family:sans-serif; background:#121212; color:white; margin:0; padding:15px; text-align:center; }
.card { background:#1e1e1e; padding:15px; border-radius:10px; margin:10px 0; }
.hide { display:none; }
button { width:100%; padding:10px; margin-top:5px; background:#cf1020; color:white; border:none; border-radius:5px; }
input, select { width:100%; padding:10px; margin-top:5px; box-sizing:border-box; }
</style>
</head>

<body>

<div id="host">
<h2>Monopoly Banker</h2>

<div class="card">
<button onclick="startHost()">Start Game</button>
</div>

<div id="hostPanel" class="hide">

<div class="card">
<h3>Room Code</h3>
<div id="roomText"></div>
<div id="qr"></div>
</div>

<div class="card">
<h3>Players</h3>
<div id="players"></div>
</div>

</div>
</div>

<div id="phone" class="hide">

<h3>Wallet</h3>
<p id="roomStatus"></p>

<div class="card hide" id="setup">

<h3>Join Game</h3>

<input id="nick" placeholder="Your name">

<select id="slot">
<option value="P1">Slot 1</option>
<option value="P2">Slot 2</option>
<option value="P3">Slot 3</option>
<option value="P4">Slot 4</option>
<option value="P5">Slot 5</option>
<option value="P6">Slot 6</option>
</select>

<button onclick="joinGame()">Join</button>

</div>

<div class="card hide" id="wallet">

<h2 id="me"></h2>
<h1 id="bal"></h1>

<select id="toName"></select>
<input id="amt" type="number" placeholder="Amount">
<button onclick="sendMoney()">Send Money</button>

</div>

</div>

<script>

/* ================= PLAYERS ================= */

let players = {
P1:{name:"",balance:1500},
P2:{name:"",balance:1500},
P3:{name:"",balance:1500},
P4:{name:"",balance:1500},
P5:{name:"",balance:1500},
P6:{name:"",balance:1500}
};

let peer, conn, roomId;
let connections = [];
let myId = "";

/* ================= AUTO MODE ================= */

const room = new URLSearchParams(location.search).get("room");

if(room){
document.getElementById("host").classList.add("hide");
document.getElementById("phone").classList.remove("hide");
document.getElementById("roomStatus").innerText = "Room: " + room;
connectPhone(room);
}

/* ================= HOST ================= */

function startHost(){

roomId = "MONO-" + Math.random().toString(36).substring(2,6).toUpperCase();

peer = new Peer(roomId);

peer.on("open", () => {

document.getElementById("hostPanel").classList.remove("hide");
document.getElementById("roomText").innerText = roomId;

new QRCode(document.getElementById("qr"), {
text: location.href + "?room=" + roomId,
width:120,
height:120
});

});

peer.on("connection", c=>{
connections.push(c);
c.on("data", handleCmd);
c.on("open", broadcast);
});

renderHost();
}

/* ================= PHONE ================= */

function connectPhone(room){

peer = new Peer();

peer.on("open", ()=>{
conn = peer.connect(room);

conn.on("open", ()=>{
document.getElementById("setup").classList.remove("hide");
});

conn.on("data", data=>{
players = data.players;

if(myId){
document.getElementById("wallet").classList.remove("hide");
renderPhone();
}
});
});
}

/* ================= JOIN ================= */

function joinGame(){

myId = document.getElementById("slot").value;
let name = document.getElementById("nick").value;

players[myId].name = name;

conn.send({
type:"SET_NAME",
player:myId,
name:name
});

document.getElementById("setup").classList.add("hide");
document.getElementById("wallet").classList.remove("hide");

renderPhone();
}

/* ================= SEND ================= */

function sendMoney(){

let to = document.getElementById("toName").value;
let amt = parseInt(document.getElementById("amt").value);

if(!amt || amt<=0) return;

conn.send({
type:"TRANSFER_NAME",
from:myId,
toName:to,
amount:amt
});
}

/* ================= HOST COMMANDS ================= */

function handleCmd(cmd){

if(cmd.type==="SET_NAME"){
players[cmd.player].name = cmd.name;
}

/* ===== FIXED BANK + PLAYER TRANSFER ===== */
if(cmd.type==="TRANSFER_NAME"){

let from = players[cmd.from];
let target = cmd.toName.toLowerCase();

if(from.balance >= cmd.amount){

// BANK CASE
if(target === "bank"){
from.balance -= cmd.amount;
broadcast();
renderHost();
return;
}

// PLAYER CASE
let toId = Object.keys(players).find(p =>
players[p].name.toLowerCase() === target
);

if(toId){
from.balance -= cmd.amount;
players[toId].balance += cmd.amount;
}
}
}

broadcast();
renderHost();
}

/* ================= RENDER HOST ================= */

function renderHost(){

let p = document.getElementById("players");
p.innerHTML = "";

for(let i in players){
p.innerHTML += `
<div style="margin:5px 0; padding:8px; background:#222;">
<b>${players[i].name || i}</b> - $${players[i].balance}
</div>`;
}
}

/* ================= RENDER PHONE ================= */

function renderPhone(){

let me = players[myId];

document.getElementById("me").innerText = me.name;
document.getElementById("bal").innerText = "$" + me.balance;

/* dropdown */
let sel = document.getElementById("toName");
sel.innerHTML = `<option value="Bank">Bank</option>`;

for(let i in players){
if(i !== myId){
sel.innerHTML += `<option value="${players[i].name}">${players[i].name}</option>`;
}
}

}

/* ================= BROADCAST ================= */

function broadcast(){
connections.forEach(c=>{
if(c.open) c.send({players});
});
}

</script>

</body>
</html>
